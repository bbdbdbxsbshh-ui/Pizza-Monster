<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Monster Pizza | Безумно сочная доставка пиццы в Бобруйске</title>
        <link rel="shortcut icon" href="images/5235590693634382575_119.jpg" type="image/x-icon">
        <link rel="preconnect" href="https://googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>
        <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                outline: none;
                font-family: 'Inter', sans-serif;
            }
            body {
                background-color: #0c0c0e;
                color: #f3f4f6;
                overflow-x: hidden;
            }
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background-color: rgb(198, 124, 0);
                padding: 12px 40px;
                position: sticky;
                top: 0;
                z-index: 100;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
                transition: all 0.3s ease;
            }
            .header__icon {
                width: 65px;
                height: 65px;
                border-radius: 50%;
                background-color: white;
                padding: 4px;
                object-fit: cover;
                border: 2px solid rgb(30, 30, 36);
                transition: transform 0.4s ease;
            }
            .header__icon:hover {
                transform: rotate(360deg) scale(1.05);
            }
            .header__nav {
                display: flex;
                align-items: center;
                gap: 20px;
                margin: 0 auto;
            }
            .header__nav a {
                text-decoration: none;
                color: white !important;
                background-color: rgb(30, 30, 36);
                padding: 12px 24px;
                border-radius: 10px;
                font-size: 16px;
                font-weight: 700;
                box-shadow: 0px 4px 0px rgb(0, 0, 0);
                transition: all 0.2s ease;
            }
            .header__nav a:hover {
                background-color: rgb(255, 255, 255);
                color: rgb(198, 124, 0) !important;
                box-shadow: 0px 4px 0px rgb(140, 85, 0);
                transform: translateY(-2px);
            }
            .header__button {
                border-radius: 10px;
                height: 46px;
                padding: 0 24px;
                font-size: 16px;
                font-weight: 800;
                background-color: rgb(140, 20, 35);
                color: white;
                border: none;
                box-shadow: 0px 4px 0px rgb(80, 5, 15);
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .header__button:hover {
                background-color: rgb(180, 30, 50);
                transform: translateY(-2px);
                box-shadow: 0px 4px 0px rgb(100, 10, 20);
            }
            .hero__name {
                text-align: center;
                padding: 80px 20px 60px 20px;
                background: radial-gradient(circle at top, #2b1a04 0%, #0c0c0e 70%);
            }
            .hero__name__h1 {
                display: block;
                width: fit-content;
                margin: 0 auto 24px auto;
                background-color: #000000;
                padding: 18px 36px;
                border-radius: 14px;
                font-size: 36px;
                font-weight: 900;
                letter-spacing: -0.5px;
                border: 2px solid rgb(198, 124, 0);
                box-shadow: 0 0 35px rgba(198, 124, 0, 0.35); 
            }
            .hero__name__p {
                font-size: 22px;
                font-weight: 500;
                color: #9ca3af;
                margin-bottom: 35px;
            }
            .hero__btn {
                background-color: rgb(255, 255, 255);
                color: rgb(198, 124, 0);
                border: none;
                padding: 18px 40px;
                font-size: 20px;
                font-weight: 800;
                border-radius: 12px;
                cursor: pointer;
                display: inline-block;
                box-shadow: 0 6px 0 rgb(140, 85, 0);
                transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .hero__btn:hover {
                background-color: rgb(240, 240, 240);
                transform: translateY(-2px);
                box-shadow: 0 8px 0 rgb(140, 85, 0);
            }
            .hero__btn:active {
                transform: translateY(4px);
                box-shadow: 0 2px 0 rgb(140, 85, 0);
            }
            .pizza-grid {
                display: none;
                justify-content: center;
                gap: 30px;
                padding: 20px 20px 80px 20px;
                flex-wrap: wrap;
                max-width: 1200px;
                margin: 0 auto;
                opacity: 0;
                transform: translateY(20px);
                transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .pizza-grid.show {
                display: flex;
                opacity: 1;
                transform: translateY(0);
            }
            .pizza-card {
                background-color: #141417;
                border: 2px solid #222227;
                border-radius: 20px;
                padding: 35px 25px;
                text-align: center;
                width: 310px;
                position: relative;
                box-shadow: 0 10px 30px rgba(0,0,0,0.6);
                transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .pizza-card::before {
                content: "🔥 BEST";
                position: absolute;
                top: -12px;
                left: 25px;
                background: linear-gradient(135deg, #ff9900, #ff3300);
                padding: 4px 12px;
                font-size: 11px;
                font-weight: 900;
                border-radius: 6px;
                box-shadow: 0 4px 10px rgba(255,51,0,0.3);
            }
            .pizza-card:hover {
                transform: translateY(-10px);
                border-color: rgb(198, 124, 0);
                box-shadow: 0 20px 40px rgba(198,124,0,0.15);
            }
            .pizza-card h3 {
                font-size: 26px;
                font-weight: 800;
                margin-bottom: 8px;
                letter-spacing: -0.5px;
            }
            .pizza-card .price {
                font-size: 24px;
                color: #00ff88;
                font-weight: 800;
                margin-bottom: 25px;
            }
            .btn-add {
                width: 100%;
                height: 48px;
                background-color: rgb(30, 30, 36);
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                box-shadow: 0 4px 0 rgb(0,0,0);
                transition: all 0.2s ease;
            }
            .btn-add:hover {
                background-color: #00ff88;
                color: #0c0c0e;
                box-shadow: 0 0 15px rgba(0,255,136,0.4);
                transform: translateY(-2px);
            }
            .btn-add:active {
                transform: translateY(2px);
                box-shadow: none;
            }
            @media (max-width: 820px) {
                header {
                    flex-direction: column;
                    gap: 15px;
                    padding: 15px 20px;
                    text-align: center;
                }
                .header__nav {
                    flex-direction: column;
                    gap: 10px;
                    width: 100%;
                }
                .header__nav a {
                    width: 100%;
                    max-width: 280px;
                }
                .header__button {
                    width: 100%;
                    max-width: 280px;
                }
                .hero__name__h1 {
                    font-size: 24px;
                    padding: 12px 20px;
                }
                .hero__name__p {
                    font-size: 16px;
                }
                .pizza-grid {
                    padding-bottom: 40px;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <img class="header__icon" src="images/5235590693634382575_119.jpg" alt="Logo">
            <nav class="header__nav">
                <a href="#">Меню</a>
                <a href="#">О нас</a>
                <a href="#">Отзывы</a>
            </nav>
            <button class="header__button" id="cart-btn">Корзина: 0.00 BYN</button>
        </header>

        <main>
            <div class="hero__name">
                <h1><span class="hero__name__h1">Безумно сочная пицца в Бобруйске от 14.99 BYN</span></h1>
                <p class="hero__name__p">Доставим горячей за 30 минут или пицца бесплатно!</p>
                <button class="hero__btn" id="show-menu-btn">Выбрать пиццу</button>
            </div>

            <div class="pizza-grid" id="pizza-menu">
                <div class="pizza-card">
                    <h3>Пепперони</h3>
                    <p class="price">16.90 BYN</p>
                    <button class="btn-add" data-price="16.90">В корзину</button>
                </div>

                <div class="pizza-card">
                    <h3>Четыре сыра</h3>
                    <p class="price">18.50 BYN</p>
                    <button class="btn-add" data-price="18.50">В корзину</button>
                </div>

                <div class="pizza-card">
                    <h3>Мясной Монстр</h3>
                    <p class="price">21.00 BYN</p>
                    <button class="btn-add" data-price="21.00">В корзину</button>
                </div>
            </div>
        </main>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
            const btnToggle = document.getElementById('show-menu-btn');
            const menuGrid = document.getElementById('pizza-menu');

            if (btnToggle && menuGrid) {
                btnToggle.addEventListener('click', () => {
                    menuGrid.classList.add('show');
                    menuGrid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }

            let currentBasketSum = 0;
            const cartDisplayBtn = document.getElementById('cart-btn');
            const itemAddButtons = document.querySelectorAll('.btn-add');

            if (cartDisplayBtn && itemAddButtons.length > 0) {
                itemAddButtons.forEach(buttonElement => {
                    buttonElement.addEventListener('click', () => {
                        const itemPrice = parseFloat(buttonElement.getAttribute('data-price'));
                        currentBasketSum += itemPrice;
                        cartDisplayBtn.textContent = `Корзина: ${currentBasketSum.toFixed(2)} BYN`;
                    });
                });
            }
        });
        </script>
    </body>
</html>
